<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Portfolio</title>
    <style>
        /* ตั้งค่าสีและฟอนต์สไตล์ Apple */
        :root {
            --bg-color: #000000;
            --text-main: #f5f5f7;
            --text-muted: #86868b;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            /* ใช้ System Font ของระบบ (จะดึงฟอนต์ San Francisco บนอุปกรณ์ Apple มาใช้) */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        
        /* เมนูด้านบนแบบโปร่งแสง */
        nav {
            display: flex;
            justify-content: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px); /* เอฟเฟกต์เบลอพื้นหลัง */
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }
        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin: 0 20px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        nav a:hover { opacity: 1; }

        /* จัดหน้าแต่ละส่วนให้อยู่ตรงกลาง */
        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: clamp(40px, 6vw, 64px); /* ปรับขนาดตัวหนังสือตามหน้าจอ */
            font-weight: 600;
            letter-spacing: -0.015em;
            margin-bottom: 15px;
        }
        p {
            font-size: clamp(18px, 3vw, 24px);
            color: var(--text-muted);
            max-width: 600px;
            font-weight: 400;
            line-height: 1.4;
        }

        /* คลาสสำหรับทำแอนิเมชันเลื่อนจอ */
        .fade-in {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1.2s ease-out, transform 1.2s ease-out;
        }
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

<nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
</nav>

<section id="home">
    <div class="fade-in">
        <h1>Hello, I'm Mean.</h1>
        <p>ยินดีต้อนรับสู่พื้นที่ส่วนตัวของผม เรียบง่าย รวดเร็ว และทำงานบนโฮมเซิร์ฟเวอร์</p>
    </div>
</section>

<section id="about">
    <div class="fade-in">
        <h1>Design meets technology.</h1>
        <p>หลงใหลในการถ่ายภาพ เทคโนโลยี และการสร้างสรรค์สิ่งใหม่ๆ</p>
    </div>
</section>

<script>
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.15 });

    document.querySelectorAll('.fade-in').forEach((el) => observer.observe(el));
</script>

</body>
</html>
