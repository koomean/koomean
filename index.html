<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links | Portfolio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-hover: rgba(255, 255, 255, 0.1);
            --text-main: #f5f5f7;
            --text-muted: #86868b;
            --accent: #2997ff;
            --accent-special: #ff9f0a;
            --navbar-height: 60px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: calc(var(--navbar-height) + 40px);
            padding-bottom: 60px;
            overflow-x: hidden;
        }

        .navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--navbar-height);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-left { display: flex; align-items: center; gap: 20px; }
        .nav-logo {
            font-size: 1.1rem; font-weight: 600; color: var(--text-main);
            text-decoration: none; display: flex; align-items: center; gap: 8px; letter-spacing: -0.02em;
        }

        .menu-link {
            color: var(--text-muted); cursor: pointer; font-size: 0.9rem; font-weight: 400;
            transition: color 0.3s; display: flex; align-items: center; gap: 6px; user-select: none;
        }
        .menu-link:hover, .menu-link.active { color: var(--text-main); }

        .dropdown { position: relative; }
        .dropdown-content {
            display: none; position: absolute; top: calc(100% + 15px); left: 0;
            background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            min-width: 180px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden; z-index: 1001; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .dropdown-content.show { display: block; animation: fadeInDrop 0.2s ease; }
        @keyframes fadeInDrop { from { opacity: 0; transform: translateY(-10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .dropdown-content a {
            color: var(--text-main); padding: 12px 18px; text-decoration: none;
            display: block; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s;
        }
        .dropdown-content a:last-child { border-bottom: none; }
        .dropdown-content a:hover { background: rgba(255,255,255,0.1); }

        .nav-right { display: flex; align-items: center; gap: 15px; }
        .nav-clock { font-variant-numeric: tabular-nums; font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
        .nav-user-container { cursor: pointer; display: flex; align-items: center; }
        .nav-profile-img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }

        .profile-section { text-align: center; margin-bottom: 30px; width: 100%; max-width: 600px; padding: 0 20px; }
        .profile-img {
            width: 100px; height: 100px; border-radius: 50%; object-fit: cover;
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        h1 { font-size: clamp(24px, 5vw, 32px); font-weight: 600; letter-spacing: -0.015em; margin-bottom: 8px; }
        p.bio { font-size: 1rem; color: var(--text-muted); font-weight: 400; line-height: 1.4; }

        .search-container { width: 100%; max-width: 600px; padding: 0 20px; margin-bottom: 30px; position: relative; }
        .search-input {
            width: 100%; padding: 14px 20px 14px 45px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); background: var(--card-bg);
            color: var(--text-main); font-size: 1rem; outline: none; transition: all 0.3s ease; font-family: inherit;
        }
        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); box-shadow: 0 0 0 4px rgba(255,255,255,0.05); }
        .search-icon { position: absolute; left: 35px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1rem; }

        .video-container { width: 100%; max-width: 600px; padding: 0 20px; margin-bottom: 30px; display: none; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); background: #111; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .container { width: 100%; max-width: 600px; padding: 0 20px 40px 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .link-card {
            background: var(--card-bg); padding: 18px 20px; border-radius: 18px;
            text-decoration: none; color: var(--text-main); display: flex; align-items: center;
            border: 1px solid rgba(255,255,255,0.05); transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.2s; cursor: pointer;
        }
        .link-card:hover { background: var(--card-hover); }
        .link-card:active { transform: scale(0.97); }
        .link-card.special-access { background: rgba(255, 159, 10, 0.1); border-color: rgba(255, 159, 10, 0.2); }
        
        .group-divider { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; margin: 15px 0 5px 10px; font-weight: 500; }
        .link-icon { font-size: 1.4rem; margin-right: 15px; width: 30px; text-align: center; }
        .link-text { font-size: 1rem; font-weight: 500; letter-spacing: -0.01em; }
        .badge { margin-left: auto; font-size: 0.75rem; padding: 4px 10px; border-radius: 12px; font-weight: 600; }
        .badge-vip { background: rgba(255, 159, 10, 0.2); color: var(--accent-special); }

        .unlock-btn {
            position: fixed; bottom: 30px; right: 30px;
            background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1); border-radius: 50%;
            width: 50px; height: 50px; display: flex; justify-content: center; align-items: center;
            transition: all 0.3s ease; z-index: 100; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 1.2rem;
        }
        .unlock-btn:hover { background: rgba(50, 50, 55, 0.9); color: var(--text-main); transform: scale(1.05); }
        .unlock-btn.active { color: var(--accent-special); border-color: rgba(255, 159, 10, 0.3); }

        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background: rgba(28, 28, 30, 0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
            padding: 30px; width: 100%; max-width: 400px; text-align: left; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: modalZoom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes modalZoom { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .close-modal { position: absolute; top: 20px; right: 25px; color: var(--text-muted); cursor: pointer; font-size: 1.5rem; transition: 0.2s; }
        .close-modal:hover { color: var(--text-main); }
        .modal h2 { margin-top: 0; font-size: 1.4rem; margin-bottom: 15px; font-weight: 600; }
        .modal p { color: var(--text-muted); line-height: 1.6; font-size: 0.95rem; white-space: pre-wrap; }

        .fade-in { opacity: 0; transform: translateY(20px); transition: opacity 0.8s ease-out, transform 0.8s ease-out; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }

        @media (max-width: 400px) {
            .nav-logo span { display: none; } 
            .unlock-btn { bottom: 20px; right: 20px; width: 45px; height: 45px; }
        }

        /* Loading Spinner */
        .loader {
            border: 3px solid rgba(255,255,255,0.1); border-radius: 50%;
            border-top: 3px solid var(--accent); width: 30px; height: 30px;
            animation: spin 1s linear infinite; margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="#" class="nav-logo">
                <i class="fab fa-apple" style="font-size: 1.2rem;"></i>
                <span>Portfolio</span>
            </a>
            
            <div class="dropdown">
                <div class="menu-link dropbtn" onclick="toggleDropdown()">
                    Apps <i class="fas fa-chevron-down" style="font-size: 0.7rem; margin-left:2px;"></i>
                </div>
                <div class="dropdown-content" id="apps-dropdown-list"></div>
            </div>

            <div class="menu-link" onclick="openAbout()">About</div>
        </div>
        
        <div class="nav-right">
            <div class="nav-clock" id="nav-clock">00:00</div>
            <div class="nav-user-container">
                <img id="nav-profile-img" src="https://ui-avatars.com/api/?name=User" class="nav-profile-img" alt="User" onerror="this.src='https://ui-avatars.com/api/?name=User&background=random'">
            </div>
        </div>
    </nav>

    <div class="profile-section fade-in" id="profile-section">
        <img src="" class="profile-img" id="main-profile-img" onerror="this.src='https://ui-avatars.com/api/?name=User&background=random'">
        <h1 id="profile-name">...</h1>
        <p class="bio" id="profile-bio">...</p>
    </div>

    <div class="search-container fade-in">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="search-input" class="search-input" placeholder="Search links..." onkeyup="searchLinks()">
    </div>

    <div class="video-container fade-in" id="featured-video">
        <div class="video-wrapper">
            <iframe id="youtube-iframe" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>

    <div class="container" id="links-container">
        <div class="loader"></div>
        <div style="text-align: center; color: var(--text-muted); margin-top: 10px;">Loading Data...</div>
    </div>

    <div id="about-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeAbout()">&times;</span>
            <h2>About</h2>
            <p id="modal-text">...</p>
        </div>
    </div>

    <button class="unlock-btn" id="unlockBtn" onclick="handleUnlock()">
        <i class="fas fa-lock"></i>
    </button>

    <script>
        // ⚠️ ใส่ URL ของ Google Apps Script ที่คัดลอกมาลงในช่องนี้ ⚠️
        const API_URL = "https://script.google.com/macros/s/AKfycbzXB_CssFkIeViXfeLq1Ap9a2Q_WvNx29bbRxYKm8UVszGNRg47gPP9lT6sHkpxFfMjsA/exec";

        let currentAccessGroup = 'public';
        let accessRules = {};
        let aboutTextContent = '';
        let globalAllLinks = [];

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in').forEach((el) => observer.observe(el));

        function toggleDropdown() {
            document.getElementById("apps-dropdown-list").classList.toggle("show");
            document.querySelector(".dropbtn").classList.toggle("active");
        }
        window.onclick = function(event) {
            if (!event.target.closest('.dropdown')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                document.querySelector(".dropbtn").classList.remove("active");
                for (var i = 0; i < dropdowns.length; i++) {
                    if (dropdowns[i].classList.contains('show')) dropdowns[i].classList.remove('show');
                }
            }
        }

        function openAbout() {
            document.getElementById('modal-text').innerText = aboutTextContent || "No information provided.";
            document.getElementById('about-modal').style.display = "flex";
        }
        function closeAbout() { document.getElementById('about-modal').style.display = "none"; }
        window.addEventListener('click', function(event) {
            const modal = document.getElementById('about-modal');
            if (event.target == modal) modal.style.display = "none";
        });

        function searchLinks() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = globalAllLinks.filter(link => link.title.toLowerCase().includes(term));
            renderLinks(filtered);
        }

        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('nav-clock').innerText = timeString;
        }
        setInterval(updateClock, 1000); updateClock();

        // โหลดข้อมูลจาก Google Sheets
        async function loadData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                // ข้อมูลโปรไฟล์
                if(data.profile) {
                    document.getElementById('profile-name').innerText = data.profile.name || 'My Portfolio';
                    document.getElementById('profile-bio').innerText = data.profile.bio || '';
                    document.getElementById('main-profile-img').src = data.profile.imageUrl || 'https://ui-avatars.com/api/?name=M&background=random';
                    aboutTextContent = data.profile.aboutText || '';
                    renderVideo(data.profile.videoUrl);
                }

                // ข้อมูลเมนูแอป
                const menuContainer = document.getElementById('apps-dropdown-list');
                menuContainer.innerHTML = '';
                if(data.apps && data.apps.length > 0) {
                    data.apps.forEach(app => {
                        menuContainer.innerHTML += `<a href="${app.url}" target="_blank">${app.name}</a>`;
                    });
                } else {
                    menuContainer.innerHTML = '<a href="#" style="color:var(--text-muted);">No Apps</a>';
                }

                // กฎการเข้าถึง
                if(data.accessRules) {
                    accessRules = data.accessRules;
                }

                // ข้อมูลลิงก์
                if(data.links) {
                    globalAllLinks = data.links;
                    renderLinks(globalAllLinks);
                }

            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('links-container').innerHTML = '<p style="text-align:center; color: #ff453a;">เกิดข้อผิดพลาดในการโหลดข้อมูล (เช็ค URL ของ Google Script อีกครั้ง)</p>';
            }
        }

        function renderLinks(linksData) {
            const container = document.getElementById('links-container');
            container.innerHTML = ''; 

            if(!linksData || linksData.length === 0) {
                container.innerHTML = '<p style="text-align:center; color: var(--text-muted);">No links found</p>';
                return;
            }

            const visibleLinks = linksData.filter(link => {
                const groupString = link.group ? link.group.toLowerCase() : 'public';
                const allowedGroups = groupString.split(',').map(g => g.trim());
                return allowedGroups.includes('public') || allowedGroups.includes(currentAccessGroup);
            });

            const specialLinks = visibleLinks.filter(link => {
                const groupString = link.group ? link.group.toLowerCase() : 'public';
                const allowedGroups = groupString.split(',').map(g => g.trim());
                return !allowedGroups.includes('public') && allowedGroups.includes(currentAccessGroup);
            });
            
            const publicLinks = visibleLinks.filter(link => {
                const groupString = link.group ? link.group.toLowerCase() : 'public';
                return groupString.includes('public');
            });

            if (specialLinks.length > 0) {
                container.innerHTML += `<div class="group-divider fade-in">Unlocked: ${currentAccessGroup}</div>`;
                specialLinks.forEach(link => renderLinkItem(container, link, true));
            }
            if (publicLinks.length > 0) {
                if (specialLinks.length > 0) container.innerHTML += `<div class="group-divider fade-in" style="margin-top: 25px;">Public Links</div>`;
                publicLinks.forEach(link => renderLinkItem(container, link, false));
            }

            document.querySelectorAll('#links-container .fade-in').forEach((el) => observer.observe(el));
            updateNavbarImage();
        }

        function renderVideo(url) {
            const videoContainer = document.getElementById('featured-video');
            const iframe = document.getElementById('youtube-iframe');
            if (url) {
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
                const match = url.match(regExp);
                const videoId = (match && match[2].length === 11) ? match[2] : null;
                if (videoId) {
                    iframe.src = `https://www.youtube.com/embed/${videoId}`;
                    videoContainer.style.display = 'block';
                } else { videoContainer.style.display = 'none'; }
            } else { videoContainer.style.display = 'none'; }
        }

        function renderLinkItem(container, link, isSpecial) {
            const iconClass = link.icon || 'fas fa-link';
            const specialClass = isSpecial ? 'special-access' : '';
            const badge = isSpecial ? `<span class="badge badge-vip"><i class="fas fa-unlock-alt" style="margin-right:4px;"></i>${currentAccessGroup}</span>` : '';
            
            let iconColorStyle = '';
            if(iconClass.includes('facebook')) iconColorStyle = 'color: #1877F2;';
            else if(iconClass.includes('youtube')) iconColorStyle = 'color: #FF0000;';
            else if(iconClass.includes('instagram')) iconColorStyle = 'color: #E4405F;';
            else if(iconClass.includes('line')) iconColorStyle = 'color: #00C300;';
            else if(iconClass.includes('tiktok')) iconColorStyle = 'color: #ffffff; text-shadow: 1px 1px 0 #00f2ea, -1px -1px 0 #ff0050;';

            const html = `
                <a href="${link.url}" target="_blank" class="link-card fade-in ${specialClass}">
                    <div class="link-icon"><i class="${iconClass}" style="${iconColorStyle}"></i></div>
                    <div class="link-text">${link.title}</div>
                    ${badge}
                </a>
            `;
            container.innerHTML += html;
        }

        function handleUnlock() {
            if (currentAccessGroup !== 'public') {
                currentAccessGroup = 'public';
                alert("🔒 ล็อคระบบแล้ว (Locked)");
                document.getElementById('unlockBtn').classList.remove('active');
                document.getElementById('unlockBtn').innerHTML = '<i class="fas fa-lock"></i>';
                renderLinks(globalAllLinks); 
            } else {
                const input = prompt("🔑 กรุณาใส่รหัสผ่านเข้าถึง (Enter Passcode):");
                if (input && accessRules[input]) {
                    currentAccessGroup = accessRules[input].toLowerCase();
                    document.getElementById('unlockBtn').classList.add('active');
                    document.getElementById('unlockBtn').innerHTML = '<i class="fas fa-unlock"></i>';
                    renderLinks(globalAllLinks); 
                } else if (input) {
                    alert("❌ รหัสไม่ถูกต้อง (Incorrect Passcode)");
                }
            }
        }

        function updateNavbarImage() {
            const navImg = document.getElementById('nav-profile-img');
            if (currentAccessGroup !== 'public') {
                navImg.style.borderColor = "var(--accent-special)";
                navImg.src = "https://ui-avatars.com/api/?name=VIP&background=ff9f0a&color=fff";
            } else {
                navImg.style.borderColor = "rgba(255,255,255,0.2)";
                navImg.src = document.getElementById('main-profile-img').src;
            }
        }

        // เริ่มต้นทำงาน
        loadData();
    </script>
</body>
</html>
